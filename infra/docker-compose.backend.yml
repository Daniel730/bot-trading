services:
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot_admin} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    # Image is built & pushed by the GitHub Actions `build` job; the Pi only pulls.
    # Override IMAGE_OWNER / IMAGE_TAG via env if you ever need a different tag.
    image: ghcr.io/${IMAGE_OWNER:-daniel730}/trading-bot-base:${IMAGE_TAG:-latest}
    container_name: trading-bot
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
      execution-engine:
        condition: service_healthy

  mcp-server:
    # Shares the trading-bot-base image built by the `bot` service above.
    # No `build:` block here so Compose doesn't redundantly re-run the build.
    image: ghcr.io/${IMAGE_OWNER:-daniel730}/trading-bot-base:${IMAGE_TAG:-latest}
    container_name: mcp-server
    command: python src/mcp_server.py
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      execution-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-I", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  execution-engine:
    image: ghcr.io/${IMAGE_OWNER:-daniel730}/execution-engine:${IMAGE_TAG:-latest}
    container_name: execution-engine
    ports:
      - "50051:50051"
    env_file:
      - ../.env
    restart: always
    # O7 fix: TCP probe confirms the JVM is bound and accepting connections before
    # dependent services (bot, mcp-server) start sending gRPC calls.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  sec-worker:
    # Shares the trading-bot-base image built by the `bot` service above.
    image: ghcr.io/${IMAGE_OWNER:-daniel730}/trading-bot-base:${IMAGE_TAG:-latest}
    container_name: sec-fundamental-worker
    command: python src/daemons/sec_fundamental_worker.py
    env_file:
      - ../.env
    volumes:
      - ../.env:/app/.env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
    name: trading-bot_redis_data
  postgres_data:
    name: trading-bot_postgres_data

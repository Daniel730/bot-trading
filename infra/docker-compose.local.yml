# Local-dev override for docker-compose.yml.
#
# Use this when you want Compose to build images locally for the host arch
# instead of pulling from GHCR. Production deploys to bot-server publish
# linux/amd64 images via GitHub Actions.
#
# Usage:
#   cd <repo root>
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.local.yml \
#     up -d --build --remove-orphans
#
# The image tags stay the same (ghcr.io/daniel730/...:latest) so swapping
# back to the prod compose file requires no other changes.

services:
  bot:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    pull_policy: build

  mcp-server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    pull_policy: build

  sec-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    pull_policy: build

  execution-engine:
    build:
      context: ../execution-engine
      dockerfile: Dockerfile
    pull_policy: build

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    pull_policy: build

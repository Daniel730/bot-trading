name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - ".gemini/**"
      - ".vscode/**"
      - ".specify/**"
  # Manual trigger. Use `force_all: true` once after switching to the registry-
  # based deploy so every image is pushed at least once. After that, normal
  # pushes run paths-filter and only rebuild what actually changed.
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild & push all images (bootstrap / disaster-recover)"
        type: boolean
        default: false

# Cancel any in-flight deploy when a newer commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires the owner segment to be lowercase. github.repository_owner
  # preserves the original case (e.g. "Daniel730"), so each job lowercases it
  # into IMAGE_OWNER via a setup step before any docker command runs.
  # Stable tag the Pi pulls. Also tagged with the commit SHA for traceability.
  IMAGE_TAG: latest

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bot_admin
          POSTGRES_PASSWORD: ci_postgres_password
          POSTGRES_DB: trading_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot_admin -d trading_bot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: bot_admin
      POSTGRES_PASSWORD: ci_postgres_password
      POSTGRES_DB: trading_bot
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      DASHBOARD_TOKEN: ci_dashboard_token_not_for_production
      PAPER_TRADING: "true"
      DEV_MODE: "false"
      DRY_RUN: "true"
      T212_API_KEY: ""
      T212_API_SECRET: ""
      POLYGON_API_KEY: ""
      GEMINI_API_KEY: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run dependency-free bug-hunt audit
        run: python scripts/bug_hunt_audit.py

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python unit tests
        run: python -m pytest tests/unit -v --asyncio-mode=auto

      - name: Run Python integration tests
        run: python -m pytest tests/integration -v --asyncio-mode=auto

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Run Java tests and build execution engine
        working-directory: execution-engine
        run: gradle test shadowJar --no-daemon

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm run test -- --run

  # -----------------------------------------------------------------------
  # 1. BUILD on a GitHub-hosted x86 runner with buildx + QEMU, push linux/arm64
  #    images to GHCR. This replaces the 30-90 minute native Pi build with a
  #    ~3-5 minute cross-build that benefits from a real CPU and registry cache.
  # -----------------------------------------------------------------------
  build:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      python_changed: ${{ steps.flags.outputs.python }}
      java_changed: ${{ steps.flags.outputs.java }}
      frontend_changed: ${{ steps.flags.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # paths-filter needs history to diff against the previous commit.
          fetch-depth: 0

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python:
              - 'src/**'
              - 'scripts/**'
              - 'legacy/dashboard/**'
              - 'requirements.txt'
              - 'infra/Dockerfile'
              - 'infra/entrypoint.sh'
              - '.dockerignore'
              - 'execution-engine/src/main/proto/**'
            java:
              - 'execution-engine/**'
            frontend:
              - 'frontend/**'

      # Effective build flags = paths-filter result OR the manual force_all input.
      # The deploy job reads these, so a force_all run rebuilds AND re-pulls
      # every service even if nothing in source actually changed.
      - name: Compute build flags
        id: flags
        run: |
          force='${{ inputs.force_all }}'
          for f in python java frontend; do
            case "$f" in
              python)   changed='${{ steps.changes.outputs.python }}'   ;;
              java)     changed='${{ steps.changes.outputs.java }}'     ;;
              frontend) changed='${{ steps.changes.outputs.frontend }}' ;;
            esac
            if [ "$force" = "true" ] || [ "$changed" = "true" ]; then
              echo "$f=true"  >> "$GITHUB_OUTPUT"
            else
              echo "$f=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Set up QEMU (arm64 emulation)
        if: |
          steps.flags.outputs.python == 'true' ||
          steps.flags.outputs.java == 'true' ||
          steps.flags.outputs.frontend == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: |
          steps.flags.outputs.python == 'true' ||
          steps.flags.outputs.java == 'true' ||
          steps.flags.outputs.frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: |
          steps.flags.outputs.python == 'true' ||
          steps.flags.outputs.java == 'true' ||
          steps.flags.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Python image (bot / mcp-server / sec-worker share this) ----
      - name: Build & push python image
        if: steps.flags.outputs.python == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:buildcache,mode=max

      - name: Build & push execution-engine image
        if: steps.flags.outputs.java == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./execution-engine
          file: ./execution-engine/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:buildcache,mode=max

      - name: Build & push frontend image
        if: steps.flags.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:buildcache,mode=max

  # -----------------------------------------------------------------------
  # 2. DEPLOY on the Pi: pull the freshly-built arm64 images and `up -d`.
  #    No compilation happens here. Capped at 15 minutes so a stuck pull
  #    or restart fails fast instead of hanging for 6 hours.
  # -----------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Link persistent .env
        run: ln -sf /home/danrasp3/.env.trading .env

      - name: Log in to GHCR (for private image pulls)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Reset any leftover BuildKit state from previously-cancelled runs.
      # Cheap insurance against the `sharing=locked` cache hangs we saw before.
      - name: Reset stale BuildKit state
        run: docker builder prune -af || true

      # Always pull the public base images (redis, postgres). They're cheap,
      # and `up -d` would otherwise pull them on first run anyway.
      - name: Pull base images (redis, postgres)
        run: docker compose -f infra/docker-compose.yml pull redis postgres

      # Pull each app image ONLY if the build job rebuilt it. Skipping a pull
      # leaves the previous local image in place, which `up -d` will reuse.
      # This is what keeps incremental deploys from failing on `manifest unknown`
      # for services whose source didn't change this run.
      - name: Pull python image (bot, mcp-server, sec-worker)
        if: needs.build.outputs.python_changed == 'true'
        run: docker compose -f infra/docker-compose.yml pull bot mcp-server sec-worker

      - name: Pull execution-engine image
        if: needs.build.outputs.java_changed == 'true'
        run: docker compose -f infra/docker-compose.yml pull execution-engine

      - name: Pull frontend image
        if: needs.build.outputs.frontend_changed == 'true'
        run: docker compose -f infra/docker-compose.yml pull frontend

      - name: Apply / restart services
        run: docker compose -f infra/docker-compose.yml up -d --remove-orphans

      - name: Cleanup dangling images
        run: docker image prune -f

      - name: Verify deployment
        run: docker compose -f infra/docker-compose.yml ps

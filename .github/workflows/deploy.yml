name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - ".gemini/**"
      - ".vscode/**"
      - ".specify/**"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Rebuild & deploy every image"
        type: boolean
        default: false
      force_python:
        description: "Rebuild & deploy Python services only"
        type: boolean
        default: false
      force_java:
        description: "Rebuild & deploy execution engine only"
        type: boolean
        default: false
      force_frontend:
        description: "Rebuild & deploy frontend only"
        type: boolean
        default: false

# Keep full workflow runs ordered on the Pi. Individual deploy jobs are also
# chained below so they do not run docker compose against the same project at
# the same time.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python_quality: ${{ steps.flags.outputs.python_quality }}
      java_quality: ${{ steps.flags.outputs.java_quality }}
      frontend_quality: ${{ steps.flags.outputs.frontend_quality }}
      python_image: ${{ steps.flags.outputs.python_image }}
      java_image: ${{ steps.flags.outputs.java_image }}
      frontend_image: ${{ steps.flags.outputs.frontend_image }}
      proto: ${{ steps.flags.outputs.proto }}
      backend_compose: ${{ steps.flags.outputs.backend_compose }}
      frontend_compose: ${{ steps.flags.outputs.frontend_compose }}
      python_deploy: ${{ steps.flags.outputs.python_deploy }}
      java_deploy: ${{ steps.flags.outputs.java_deploy }}
      frontend_deploy: ${{ steps.flags.outputs.frontend_deploy }}
      any_deploy: ${{ steps.flags.outputs.any_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            python_image:
              - 'src/**'
              - 'scripts/**'
              - 'legacy/dashboard/**'
              - 'requirements.txt'
              - 'requirements.lock'
              - 'infra/Dockerfile'
              - 'infra/entrypoint.sh'
              - '.dockerignore'
              - 'execution-engine/src/main/proto/**'
            python_tests:
              - 'tests/**'
            java_image:
              - 'execution-engine/**'
            frontend_image:
              - 'frontend/**'
            proto:
              - 'execution-engine/src/main/proto/**'
            backend_compose:
              - 'infra/docker-compose.yml'
              - 'infra/docker-compose.backend.yml'
            frontend_compose:
              - 'infra/docker-compose.yml'
              - 'infra/docker-compose.frontend.yml'

      - name: Compute workflow flags
        id: flags
        run: |
          force_all='${{ inputs.force_all }}'
          force_python='${{ inputs.force_python }}'
          force_java='${{ inputs.force_java }}'
          force_frontend='${{ inputs.force_frontend }}'

          python_image='${{ steps.changes.outputs.python_image }}'
          python_tests='${{ steps.changes.outputs.python_tests }}'
          java_image='${{ steps.changes.outputs.java_image }}'
          frontend_image='${{ steps.changes.outputs.frontend_image }}'
          proto='${{ steps.changes.outputs.proto }}'
          backend_compose='${{ steps.changes.outputs.backend_compose }}'
          frontend_compose='${{ steps.changes.outputs.frontend_compose }}'

          if [ "$force_all" = "true" ] || [ "$force_python" = "true" ]; then
            python_image='true'
          fi
          if [ "$force_all" = "true" ] || [ "$force_java" = "true" ]; then
            java_image='true'
          fi
          if [ "$force_all" = "true" ] || [ "$force_frontend" = "true" ]; then
            frontend_image='true'
          fi

          python_quality='false'
          java_quality='false'
          frontend_quality='false'
          python_deploy='false'
          java_deploy='false'
          frontend_deploy='false'

          if [ "$python_image" = "true" ] || [ "$python_tests" = "true" ]; then
            python_quality='true'
          fi
          if [ "$java_image" = "true" ]; then
            java_quality='true'
          fi
          if [ "$frontend_image" = "true" ]; then
            frontend_quality='true'
          fi

          if [ "$python_image" = "true" ] || [ "$backend_compose" = "true" ]; then
            python_deploy='true'
          fi
          if [ "$java_image" = "true" ] || [ "$backend_compose" = "true" ]; then
            java_deploy='true'
          fi
          if [ "$frontend_image" = "true" ] || [ "$frontend_compose" = "true" ]; then
            frontend_deploy='true'
          fi

          any_deploy='false'
          if [ "$python_deploy" = "true" ] || [ "$java_deploy" = "true" ] || [ "$frontend_deploy" = "true" ]; then
            any_deploy='true'
          fi

          {
            echo "python_quality=$python_quality"
            echo "java_quality=$java_quality"
            echo "frontend_quality=$frontend_quality"
            echo "python_image=$python_image"
            echo "java_image=$java_image"
            echo "frontend_image=$frontend_image"
            echo "proto=$proto"
            echo "backend_compose=$backend_compose"
            echo "frontend_compose=$frontend_compose"
            echo "python_deploy=$python_deploy"
            echo "java_deploy=$java_deploy"
            echo "frontend_deploy=$frontend_deploy"
            echo "any_deploy=$any_deploy"
          } >> "$GITHUB_OUTPUT"

  quality_python:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.python_quality == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bot_admin
          POSTGRES_PASSWORD: ci_postgres_password
          POSTGRES_DB: trading_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bot_admin -d trading_bot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: bot_admin
      POSTGRES_PASSWORD: ci_postgres_password
      POSTGRES_DB: trading_bot
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      DASHBOARD_TOKEN: ci_dashboard_token_not_for_production
      PAPER_TRADING: "true"
      DEV_MODE: "false"
      DRY_RUN: "true"
      T212_API_KEY: ""
      T212_API_SECRET: ""
      POLYGON_API_KEY: ""
      GEMINI_API_KEY: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run dependency-free bug-hunt audit
        run: python scripts/bug_hunt_audit.py

      - name: Install Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install --system -r requirements.lock

      - name: Initialize Postgres schema
        run: python scripts/init_db.py

      - name: Run Python unit tests
        run: python -m pytest tests/unit -v --asyncio-mode=auto

      - name: Run Python integration tests
        run: python -m pytest tests/integration -v --asyncio-mode=auto

  quality_java:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.java_quality == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Run Java tests and build execution engine
        working-directory: execution-engine
        run: gradle test shadowJar --no-daemon

  quality_frontend:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.frontend_quality == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm run test -- --run

  build_python:
    needs:
      - detect_changes
      - quality_python
      - quality_java
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.python_image == 'true' &&
        needs.quality_python.result == 'success' &&
        (
          needs.detect_changes.outputs.proto != 'true' ||
          needs.quality_java.result == 'success'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-bot-base:buildcache,mode=max

  build_java:
    needs:
      - detect_changes
      - quality_java
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.java_image == 'true' &&
        needs.quality_java.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push execution-engine image
        uses: docker/build-push-action@v6
        with:
          context: ./execution-engine
          file: ./execution-engine/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/execution-engine:buildcache,mode=max

  build_frontend:
    needs:
      - detect_changes
      - quality_frontend
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.frontend_image == 'true' &&
        needs.quality_frontend.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/trading-frontend:buildcache,mode=max

  deploy_frontend:
    needs:
      - detect_changes
      - build_frontend
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.frontend_deploy == 'true' &&
        (
          needs.detect_changes.outputs.frontend_image != 'true' ||
          needs.build_frontend.result == 'success'
        )
      }}
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV_FILE: /home/danrasp3/.env.trading
      DEPLOY_ENV_FILE: /home/danrasp3/.env.trading
      COMPOSE_IGNORE_ORPHANS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Validate deploy environment
        run: python3 scripts/validate_deploy_env.py "$DEPLOY_ENV_FILE"

      - name: Log in to GHCR (for private image pulls)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull frontend image
        if: ${{ needs.detect_changes.outputs.frontend_image == 'true' }}
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml pull frontend

      - name: Remove legacy frontend container
        run: docker rm -f trading-frontend 2>/dev/null || true

      - name: Apply / restart frontend
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml config --quiet
          timeout 5m docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml up -d frontend

      - name: Verify frontend deployment
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml ps frontend

      - name: Dump frontend logs on deployment failure
        if: failure()
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml ps frontend || true
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.frontend.yml logs --tail=120 frontend || true

  deploy_execution_engine:
    needs:
      - detect_changes
      - build_java
      - deploy_frontend
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.java_deploy == 'true' &&
        (
          needs.detect_changes.outputs.java_image != 'true' ||
          needs.build_java.result == 'success'
        )
      }}
    runs-on: self-hosted
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV_FILE: /home/danrasp3/.env.trading
      DEPLOY_ENV_FILE: /home/danrasp3/.env.trading
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Validate deploy environment
        run: python3 scripts/validate_deploy_env.py "$DEPLOY_ENV_FILE"

      - name: Log in to GHCR (for private image pulls)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull execution-engine image
        if: ${{ needs.detect_changes.outputs.java_image == 'true' }}
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml pull execution-engine

      - name: Remove legacy execution-engine container
        run: docker rm -f execution-engine 2>/dev/null || true

      - name: Apply / restart execution engine
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml config --quiet
          timeout 5m docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml up -d execution-engine

      - name: Verify execution-engine deployment
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps execution-engine

      - name: Dump execution-engine logs on deployment failure
        if: failure()
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps execution-engine || true
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml logs --tail=120 execution-engine || true

  deploy_sec_worker:
    needs:
      - detect_changes
      - build_python
      - deploy_execution_engine
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.python_deploy == 'true' &&
        (
          needs.detect_changes.outputs.python_image != 'true' ||
          needs.build_python.result == 'success'
        )
      }}
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV_FILE: /home/danrasp3/.env.trading
      DEPLOY_ENV_FILE: /home/danrasp3/.env.trading
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Validate deploy environment
        run: python3 scripts/validate_deploy_env.py "$DEPLOY_ENV_FILE"

      - name: Log in to GHCR (for private image pulls)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull python image (bot, mcp-server, sec-worker)
        if: ${{ needs.detect_changes.outputs.python_image == 'true' }}
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml pull bot mcp-server sec-worker

      - name: Remove legacy sec-worker and base containers
        run: |
          docker rm -f \
            trading-redis \
            trading-postgres \
            sec-fundamental-worker \
            2>/dev/null || true

      - name: Apply / restart sec-worker
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml config --quiet
          timeout 5m docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml up -d sec-worker

      - name: Cleanup dangling images (force-all only)
        if: ${{ inputs.force_all == true }}
        run: docker image prune -f

      - name: Verify sec-worker deployment
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps sec-worker redis postgres

      - name: Dump sec-worker logs on deployment failure
        if: failure()
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps || true
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml logs --tail=120 sec-worker postgres redis || true

  deploy_python_services:
    needs:
      - detect_changes
      - build_python
      - deploy_execution_engine
      - deploy_sec_worker
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.python_deploy == 'true' &&
        (
          needs.detect_changes.outputs.python_image != 'true' ||
          needs.build_python.result == 'success'
        ) &&
        needs.deploy_sec_worker.result == 'success' &&
        (
          needs.detect_changes.outputs.java_deploy != 'true' ||
          needs.deploy_execution_engine.result == 'success'
        )
      }}
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV_FILE: /home/danrasp3/.env.trading
      DEPLOY_ENV_FILE: /home/danrasp3/.env.trading
      COMPOSE_IGNORE_ORPHANS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Validate deploy environment
        run: python3 scripts/validate_deploy_env.py "$DEPLOY_ENV_FILE"

      - name: Log in to GHCR (for private image pulls)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull python image (bot, mcp-server)
        if: ${{ needs.detect_changes.outputs.python_image == 'true' }}
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml pull bot mcp-server

      - name: Remove legacy bot and mcp-server containers
        run: docker rm -f trading-bot mcp-server 2>/dev/null || true

      - name: Apply / restart bot and mcp-server
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml config --quiet
          timeout 10m docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml up -d --no-deps bot mcp-server

      - name: Cleanup dangling images (force-all only)
        if: ${{ inputs.force_all == true }}
        run: docker image prune -f

      - name: Verify bot and mcp-server deployment
        run: docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps bot mcp-server

      - name: Dump bot and mcp-server logs on deployment failure
        if: failure()
        run: |
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml ps || true
          docker compose --env-file "$DEPLOY_ENV_FILE" -p trading-bot -f infra/docker-compose.backend.yml logs --tail=120 bot mcp-server execution-engine postgres redis || true

  deployment_summary:
    needs:
      - detect_changes
      - quality_python
      - quality_java
      - quality_frontend
      - build_python
      - build_java
      - build_frontend
      - deploy_frontend
      - deploy_execution_engine
      - deploy_sec_worker
      - deploy_python_services
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write deployment summary
        run: |
          {
            echo "## Deployment summary"
            echo
            echo "| Lane | Quality | Build | Deploy |"
            echo "| --- | --- | --- | --- |"
            echo "| SEC worker | ${{ needs.quality_python.result }} | ${{ needs.build_python.result }} | ${{ needs.deploy_sec_worker.result }} |"
            echo "| Bot / MCP server | ${{ needs.quality_python.result }} | ${{ needs.build_python.result }} | ${{ needs.deploy_python_services.result }} |"
            echo "| Execution engine | ${{ needs.quality_java.result }} | ${{ needs.build_java.result }} | ${{ needs.deploy_execution_engine.result }} |"
            echo "| Frontend | ${{ needs.quality_frontend.result }} | ${{ needs.build_frontend.result }} | ${{ needs.deploy_frontend.result }} |"
            echo
            echo "### Change flags"
            echo
            echo "- python_image: ${{ needs.detect_changes.outputs.python_image }}"
            echo "- java_image: ${{ needs.detect_changes.outputs.java_image }}"
            echo "- frontend_image: ${{ needs.detect_changes.outputs.frontend_image }}"
            echo "- backend_compose: ${{ needs.detect_changes.outputs.backend_compose }}"
            echo "- frontend_compose: ${{ needs.detect_changes.outputs.frontend_compose }}"
            echo "- proto: ${{ needs.detect_changes.outputs.proto }}"
          } >> "$GITHUB_STEP_SUMMARY"
